<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Prone Areas - AI Blackspot</title>
  <link rel="stylesheet" href="/static/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand"><i class="fa fa-road"></i> AI Blackspot</div>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/predict">Predict</a></li>
      <li><a href="/map">Map</a></li>
      <li><a href="/dashboard">Dashboard</a></li>
      <li><a href="/prone" class="active">Prone Areas</a></li>
      <li><a href="/traffic">Traffic</a></li>
      <li><a href="/alert">Alerts</a></li>
    </ul>
  </nav>

  <div style="padding:2rem 2.5rem">
    <div style="margin-bottom:2rem">
      <h1 style="color:#fff;font-size:1.8rem">⚠ Top Accident Prone Areas</h1>
      <p style="color:#aaa">Top 20 most dangerous locations ranked by AI danger score</p>
    </div>

    <!-- MAP -->
    <div id="prone-map" style="height:400px;border-radius:12px;
         border:1px solid #2a2d3e;margin-bottom:2rem"></div>

    <!-- RANKED LIST -->
    <div id="prone-list">
      <div style="color:#aaa;text-align:center;padding:2rem">Loading...</div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    let proneMap;

    async function loadProneAreas() {
      const res  = await fetch('/api/prone-areas');
      const data = await res.json();

      if (!data.success) return;

      // Init map
      proneMap = L.map('prone-map').setView([20.5937, 78.9629], 5);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
        { attribution:'© CartoDB', maxZoom:18 }).addTo(proneMap);

      // Build list HTML
      let html = '';
      data.areas.forEach(area => {
        // Add map marker
        const circle = L.circleMarker([area.lat, area.lng], {
          radius:14, fillColor: area.danger_color,
          color: area.danger_color, weight:2,
          opacity:1, fillOpacity:0.8
        }).addTo(proneMap);

        circle.bindTooltip(`#${area.rank} ${area.city}`, {permanent:true, className:'rank-label'});
        circle.bindPopup(`
          <div style="background:#1a1d2e;color:#fff;padding:12px;border-radius:8px;min-width:200px">
            <strong style="color:${area.danger_color}">#${area.rank} — ${area.danger_level}</strong>
            <hr style="border-color:#333;margin:6px 0"/>
            📍 City: <b>${area.city}</b><br/>
            💀 Fatal: <b>${area.fatal_count}</b><br/>
            ⚠ Total: <b>${area.total_accidents}</b><br/>
            📊 Danger Score: <b>${area.danger_score}</b><br/>
            🌦 Common Weather: <b>${area.common_weather}</b><br/>
            🕐 Peak Hour: <b>${area.peak_hour}:00</b>
          </div>
        `);

        // List card
        html += `
          <div style="background:#1a1d2e;border:1px solid #2a2d3e;
               border-left:4px solid ${area.danger_color};
               border-radius:12px;padding:1.2rem;margin-bottom:1rem;
               display:flex;align-items:center;gap:1.5rem">

            <div style="font-size:2rem;font-weight:900;color:${area.danger_color};
                 min-width:50px;text-align:center">#${area.rank}</div>

            <div style="flex:1">
              <div style="display:flex;align-items:center;gap:0.8rem;margin-bottom:0.4rem">
                <span style="font-size:1.1rem;font-weight:700;color:#fff">${area.city}</span>
                <span style="background:${area.danger_color}22;color:${area.danger_color};
                     padding:2px 10px;border-radius:4px;font-size:0.8rem;font-weight:600">
                  ${area.danger_level}
                </span>
              </div>
              <div style="display:flex;gap:1.5rem;flex-wrap:wrap">
                <span style="color:#aaa;font-size:0.85rem">
                  💀 Fatal: <b style="color:#e74c3c">${area.fatal_count}</b>
                </span>
                <span style="color:#aaa;font-size:0.85rem">
                  ⚠ Total: <b style="color:#fff">${area.total_accidents}</b>
                </span>
                <span style="color:#aaa;font-size:0.85rem">
                  🌦 ${area.common_weather}
                </span>
                <span style="color:#aaa;font-size:0.85rem">
                  🛣 ${area.common_road}
                </span>
                <span style="color:#aaa;font-size:0.85rem">
                  🕐 Peak: ${area.peak_hour}:00
                </span>
              </div>
            </div>

            <div style="text-align:center;min-width:80px">
              <div style="font-size:1.5rem;font-weight:800;color:${area.danger_color}">
                ${area.danger_score}
              </div>
              <div style="font-size:0.75rem;color:#aaa">Danger Score</div>
            </div>
          </div>`;
      });

      document.getElementById('prone-list').innerHTML = html;
    }

    window.onload = loadProneAreas;
  </script>
</body>
</html>
